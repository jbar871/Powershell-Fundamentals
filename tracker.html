<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef1f6;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #2c3e50;
      color: #fff;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.3rem; letter-spacing: 0.03em; }

    .add-btn {
      background: #4a90d9;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .add-btn:hover { background: #357abd; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .modal h2 { margin-bottom: 18px; font-size: 1.1rem; color: #2c3e50; }

    .modal label {
      display: block;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 4px;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal input, .modal textarea, .modal select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fafafa;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus {
      outline: none; border-color: #4a90d9; background: #fff;
    }
    .modal textarea { resize: vertical; min-height: 80px; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
    }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-primary:hover { background: #357abd; }
    .btn-secondary { background: #eee; color: #555; }
    .btn-secondary:hover { background: #ddd; }

    /* Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 24px;
      min-height: calc(100vh - 60px);
    }

    .column {
      background: #dde2ea;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .column-title {
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
    }

    .column-count {
      background: #fff;
      color: #555;
      font-size: 0.78rem;
      font-weight: 700;
      border-radius: 12px;
      padding: 2px 8px;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-top: 3px solid #4a90d9;
      cursor: default;
    }

    .col-inprogress .card { border-top-color: #f39c12; }
    .col-done .card      { border-top-color: #27ae60; opacity: 0.75; }

    .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: #2c3e50;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .col-done .card-title { text-decoration: line-through; color: #999; }

    .card-meta {
      font-size: 0.8rem;
      color: #777;
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 8px;
    }

    .card-meta a { color: #4a90d9; text-decoration: none; }
    .card-meta a:hover { text-decoration: underline; }

    .priority-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .p-high   { background: #fde8e8; color: #c0392b; }
    .p-medium { background: #fef3cd; color: #b7770d; }
    .p-low    { background: #dcfce7; color: #166534; }
    .p-other  { background: #e8eaf0; color: #555; }

    .card-notes {
      font-size: 0.82rem;
      color: #666;
      background: #f7f9fb;
      border-radius: 5px;
      padding: 7px 10px;
      margin-bottom: 8px;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .card-date { font-size: 0.72rem; color: #bbb; margin-bottom: 10px; }

    .card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .card-btn {
      font-size: 0.78rem;
      padding: 4px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }
    .cb-progress { background: #fef3cd; color: #b7770d; }
    .cb-progress:hover { background: #fde68a; }
    .cb-done    { background: #dcfce7; color: #166534; }
    .cb-done:hover { background: #bbf7d0; }
    .cb-back    { background: #e8eaf0; color: #555; }
    .cb-back:hover { background: #d1d5db; }
    .cb-delete  { background: #fde8e8; color: #c0392b; }
    .cb-delete:hover { background: #fecaca; }

    .empty-col {
      text-align: center;
      color: #aaa;
      font-size: 0.85rem;
      padding: 20px 0;
    }

    @media (max-width: 700px) {
      .board { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>To-Do Tracker</h1>
  <button class="add-btn" onclick="openModal()">+ New Item</button>
</header>

<!-- Add / Edit Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <h2 id="modalTitle">New Item</h2>
    <input type="hidden" id="editId" />

    <label>Task / Subject *</label>
    <input type="text" id="fTitle" placeholder="What needs to be done?" />

    <label>Name</label>
    <input type="text" id="fName" placeholder="Contact name" />

    <label>Email</label>
    <input type="email" id="fEmail" placeholder="email@example.com" />

    <label>Priority</label>
    <select id="fPriority">
      <option value="">— None —</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>

    <label>Notes</label>
    <textarea id="fNotes" placeholder="Any additional notes..."></textarea>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- Board -->
<div class="board">
  <div class="column" id="col-open">
    <div class="column-header">
      <span class="column-title">Open</span>
      <span class="column-count" id="count-open">0</span>
    </div>
    <div id="cards-open"></div>
  </div>

  <div class="column col-inprogress" id="col-inprogress">
    <div class="column-header">
      <span class="column-title">In Progress</span>
      <span class="column-count" id="count-inprogress">0</span>
    </div>
    <div id="cards-inprogress"></div>
  </div>

  <div class="column col-done" id="col-done">
    <div class="column-header">
      <span class="column-title">Done</span>
      <span class="column-count" id="count-done">0</span>
    </div>
    <div id="cards-done"></div>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('tracker_items') || '[]');

  function save() {
    localStorage.setItem('tracker_items', JSON.stringify(items));
  }

  function openModal(id) {
    document.getElementById('editId').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fName').value = '';
    document.getElementById('fEmail').value = '';
    document.getElementById('fPriority').value = '';
    document.getElementById('fNotes').value = '';
    document.getElementById('modalTitle').textContent = 'New Item';

    if (id) {
      const item = items.find(i => i.id === id);
      if (item) {
        document.getElementById('editId').value = id;
        document.getElementById('fTitle').value = item.title;
        document.getElementById('fName').value = item.name;
        document.getElementById('fEmail').value = item.email;
        document.getElementById('fPriority').value = item.priority;
        document.getElementById('fNotes').value = item.notes;
        document.getElementById('modalTitle').textContent = 'Edit Item';
      }
    }

    document.getElementById('modalBackdrop').classList.add('open');
    document.getElementById('fTitle').focus();
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
  }

  function closeOnBackdrop(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModal();
  }

  function saveItem() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { alert('Task / Subject is required.'); return; }

    const editId = document.getElementById('editId').value;

    if (editId) {
      const item = items.find(i => i.id == editId);
      if (item) {
        item.title    = title;
        item.name     = document.getElementById('fName').value.trim();
        item.email    = document.getElementById('fEmail').value.trim();
        item.priority = document.getElementById('fPriority').value;
        item.notes    = document.getElementById('fNotes').value.trim();
      }
    } else {
      items.unshift({
        id:       Date.now(),
        title,
        name:     document.getElementById('fName').value.trim(),
        email:    document.getElementById('fEmail').value.trim(),
        priority: document.getElementById('fPriority').value,
        notes:    document.getElementById('fNotes').value.trim(),
        status:   'open',
        created:  new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
      });
    }

    save();
    closeModal();
    render();
  }

  function moveItem(id, status) {
    const item = items.find(i => i.id === id);
    if (item) { item.status = status; save(); render(); }
  }

  function deleteItem(id) {
    if (!confirm('Delete this item?')) return;
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function priorityClass(p) {
    if (!p) return '';
    if (p === 'High')   return 'p-high';
    if (p === 'Medium') return 'p-medium';
    if (p === 'Low')    return 'p-low';
    return 'p-other';
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function cardHTML(item) {
    const actions = [];
    if (item.status === 'open') {
      actions.push(`<button class="card-btn cb-progress" onclick="moveItem(${item.id},'inprogress')">In Progress</button>`);
      actions.push(`<button class="card-btn cb-done"     onclick="moveItem(${item.id},'done')">Done</button>`);
    } else if (item.status === 'inprogress') {
      actions.push(`<button class="card-btn cb-back"     onclick="moveItem(${item.id},'open')">&#8592; Open</button>`);
      actions.push(`<button class="card-btn cb-done"     onclick="moveItem(${item.id},'done')">Done</button>`);
    } else {
      actions.push(`<button class="card-btn cb-back"     onclick="moveItem(${item.id},'open')">Reopen</button>`);
    }
    actions.push(`<button class="card-btn cb-back"   onclick="openModal(${item.id})">Edit</button>`);
    actions.push(`<button class="card-btn cb-delete" onclick="deleteItem(${item.id})">Delete</button>`);

    return `
      <div class="card">
        ${item.priority ? `<span class="priority-badge ${priorityClass(item.priority)}">${esc(item.priority)}</span>` : ''}
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-meta">
          ${item.name  ? `<span>&#128100; ${esc(item.name)}</span>` : ''}
          ${item.email ? `<span>&#9993; <a href="mailto:${esc(item.email)}">${esc(item.email)}</a></span>` : ''}
        </div>
        ${item.notes ? `<div class="card-notes">${esc(item.notes)}</div>` : ''}
        <div class="card-date">Added ${esc(item.created)}</div>
        <div class="card-actions">${actions.join('')}</div>
      </div>
    `;
  }

  function render() {
    ['open','inprogress','done'].forEach(status => {
      const group = items.filter(i => i.status === status);
      document.getElementById(`count-${status}`).textContent = group.length;
      const container = document.getElementById(`cards-${status}`);
      container.innerHTML = group.length
        ? group.map(cardHTML).join('')
        : '<div class="empty-col">Nothing here</div>';
    });
  }

  // Migrate old data that used done:true/false
  items = items.map(i => {
    if (i.status === undefined) i.status = i.done ? 'done' : 'open';
    return i;
  });

  render();
</script>
</body>
</html>
